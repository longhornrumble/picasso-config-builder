name: Deploy Picasso Config Builder

on:
  # Push to main runs the quality gates + build only. The deploy-production
  # job is dispatch-only, so prod deploys are deliberate acts and merges never
  # queue waiting-approval runs (CI-modernization Phase 0.3 — the queue had
  # 8 runs stuck since 2026-05-24).
  push:
    branches:
      - main
  workflow_dispatch: {}

# Staging: PRs deploy a preview to picasso-config-builder-staging via
# pr-checks.yml's Deploy to Staging job (CI-modernization Phase 2.3 closed
# the old TODO(staging-env) — bucket + role live in the staging account 525,
# applied by picasso#492). Note the preview serves the production-mode
# bundle (pcb has one build target); it previews the UI, not a separate
# staging backend.

env:
  NODE_VERSION: '22'
  AWS_REGION: 'us-east-1'
  S3_BUCKET_PRODUCTION: 'picasso-config-builder-prod'
  CLOUDFRONT_DISTRIBUTION_ID: 'E3OTEE0UFN347Y'

# Serialize runs (picasso Phase-2 audit D1): two simultaneous dispatches
# would race the live-bucket sync (--delete) and the prev-release lookup
# in the reusable. Queue behind a mid-flight run, never cancel it.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  lint:
    name: Code Quality - Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

  typecheck:
    name: Code Quality - Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high

  build:
    name: Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build:production
        env:
          # Meta_OAuth_Handler Function URL in the PROD account (614). The
          # component no longer hardcodes this — every build must declare its
          # channels API explicitly (staging value is set in pr-checks.yml), so
          # a build that forgets fails loud instead of silently using prod.
          # Public Function URL, not a secret.
          VITE_CHANNELS_API_URL: https://qwxscz5w6lkzjmhcpyhewijize0jpzzx.lambda-url.us-east-1.on.aws

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: config-builder-build
          path: dist/
          retention-days: 7

  # Promote-step prod-config gate (2026-06-28). Validates that the schema in the
  # build about to be promoted can read EVERY live prod tenant config, BEFORE we
  # deploy to prod. Moved here from pr-checks.yml: a PR is staging-bound and must
  # not be blocked by pre-existing prod-config drift it didn't cause; prod
  # validation belongs at the deliberate dispatch-only promote step. (Forward-
  # compat is also guarded on every PR by the fixture suite in Test Suite.)
  # Dispatch-only — does not run on plain pushes to main.
  prod-config-validation:
    name: Prod Config Schema Validation (promote gate)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Scopes the OIDC token subject to `repo:...:environment:config-promotion`
    # (not a bare branch ref), which is what the prod-614 picasso-config-ci-
    # readonly role trusts. Without this the dispatch token is
    # `...:ref:refs/heads/main` and AssumeRoleWithWebIdentity is denied. The
    # environment carries NO required reviewers (the human gate lives on the
    # separate approve-production job), so this does not pause the run.
    environment: config-promotion
    permissions:
      id-token: write     # OIDC into the prod-614 read-only config role
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (prod-614 read-only)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.PROD_CONFIG_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: ci-config-promote-${{ github.run_id }}

      - name: Validate prod tenant configs against schema
        run: npx tsx scripts/validate-prod-configs.ts
        env:
          S3_BUCKET: myrecruiter-picasso

  # The human gate. Reusable-caller jobs can't carry `environment:`, so the
  # required-reviewer pause lives in this tiny job in front (widget pattern).
  approve-production:
    name: Approve Production Deploy
    needs: [lint, typecheck, test, security, build]
    # Dispatch-only (see `on:` comment): pushes stop after the build job.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approval received
        run: echo "Production deploy approved by ${{ github.actor }}"

  deploy-production:
    name: Deploy to Production
    # Gated on BOTH the human approval AND the prod-config promote gate: if the
    # about-to-deploy schema can't read a live prod config, do not promote.
    needs: [approve-production, prod-config-validation]
    permissions:
      id-token: write
      contents: read
    # Shared deploy mechanics (sync → invalidate → smoke) + the immutable
    # releases/<sha>/ rollback copy — CI-modernization Phase 2.1/2.2.
    # SHA-pinned (picasso Phase-2 audit D8): @main meant any reusable change
    # could startup_failure this workflow with no warning in THIS repo (the
    # picasso#494 class). Bump deliberately to adopt reusable changes.
    # Current pin = picasso#561/#562 (D10 fix: the prior pin 643e0d8 carried
    # an auto-rollback that would WIPE the live bucket; this pin rewrites it
    # download-then-upload + adds an empty-source abort guard).
    uses: longhornrumble/picasso/.github/workflows/deploy-frontend.yml@aec1b46e8d242b3d123a8b7ff51c41fc44e635e6
    with:
      environment: production
      artifact_name: config-builder-build
      bucket: picasso-config-builder-prod
      cloudfront_distribution_id: E3OTEE0UFN347Y
      website_url: https://config.myrecruiter.ai
    secrets:
      deploy_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

  # The reusable deploy job archives releases/<sha>/ but does NOT tag. This job
  # supplies the deploy-production-* tag that prod-staleness-check.yml diffs
  # against — without it the staleness check no-ops forever (no tags to compare).
  # Mirrors the widget's post-deploy "Create deployment tag" step.
  post-deploy:
    name: Tag production deployment
    needs: deploy-production
    # Only when the prod deploy actually ran + succeeded (the deploy job is
    # dispatch-gated behind approve-production; on a plain push it's skipped).
    if: needs.deploy-production.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # pushes the deploy-production-* tag
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Create deployment tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          TAG_NAME="deploy-production-$(date +%Y%m%d-%H%M%S)"
          git tag -a "$TAG_NAME" -m "Production deployment $TAG_NAME"
          git push origin "$TAG_NAME"

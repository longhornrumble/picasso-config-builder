name: Deploy Picasso Config Builder

on:
  # Push to main runs the quality gates + build only. The deploy-production
  # job is dispatch-only, so prod deploys are deliberate acts and merges never
  # queue waiting-approval runs (CI-modernization Phase 0.3 — the queue had
  # 8 runs stuck since 2026-05-24).
  push:
    branches:
      - main
  workflow_dispatch: {}

# Staging: PRs deploy a preview to picasso-config-builder-staging via
# pr-checks.yml's Deploy to Staging job (CI-modernization Phase 2.3 closed
# the old TODO(staging-env) — bucket + role live in the staging account 525,
# applied by picasso#492). Note the preview serves the production-mode
# bundle (pcb has one build target); it previews the UI, not a separate
# staging backend.

env:
  NODE_VERSION: '22'
  AWS_REGION: 'us-east-1'
  S3_BUCKET_PRODUCTION: 'picasso-config-builder-prod'
  CLOUDFRONT_DISTRIBUTION_ID: 'E3OTEE0UFN347Y'

# Serialize runs (picasso Phase-2 audit D1): two simultaneous dispatches
# would race the live-bucket sync (--delete) and the prev-release lookup
# in the reusable. Queue behind a mid-flight run, never cancel it.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  lint:
    name: Code Quality - Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

  typecheck:
    name: Code Quality - Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high

  build:
    name: Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build:production

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: config-builder-build
          path: dist/
          retention-days: 7

  # The human gate. Reusable-caller jobs can't carry `environment:`, so the
  # required-reviewer pause lives in this tiny job in front (widget pattern).
  approve-production:
    name: Approve Production Deploy
    needs: [lint, typecheck, test, security, build]
    # Dispatch-only (see `on:` comment): pushes stop after the build job.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approval received
        run: echo "Production deploy approved by ${{ github.actor }}"

  deploy-production:
    name: Deploy to Production
    needs: approve-production
    permissions:
      id-token: write
      contents: read
    # Shared deploy mechanics (sync → invalidate → smoke) + the immutable
    # releases/<sha>/ rollback copy — CI-modernization Phase 2.1/2.2.
    # SHA-pinned (picasso Phase-2 audit D8): @main meant any reusable change
    # could startup_failure this workflow with no warning in THIS repo (the
    # picasso#494 class). Bump deliberately to adopt reusable changes.
    # Current pin = picasso#520 (audit hardening).
    uses: longhornrumble/picasso/.github/workflows/deploy-frontend.yml@643e0d83cb9d625554652533e2be6176c202761d
    with:
      environment: production
      artifact_name: config-builder-build
      bucket: picasso-config-builder-prod
      cloudfront_distribution_id: E3OTEE0UFN347Y
      website_url: https://config.myrecruiter.ai
    secrets:
      deploy_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

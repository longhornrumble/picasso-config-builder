name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-e2e:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    # Tight ceiling so a future hang fails fast instead of eating 20 min.
    # Locally the chromium suite completes in minutes; 10 is generous.
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache the ~100 MB per-browser download. Keyed on Playwright
      # version so a version bump triggers a fresh download.
      - name: Resolve Playwright version
        id: pw-version
        run: |
          version=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}-${{ matrix.browser }}

      - name: Install Playwright browser (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Build application
        run: npm run build:dev
        env:
          # Swap @clerk/react → src/e2e/clerk-mock.tsx at bundle time.
          # E2E tests assert this app's behavior, not Clerk's SaaS.
          # Production builds reject this flag (esbuild.config.mjs).
          VITE_E2E_BYPASS_AUTH: 'true'
          VITE_API_URL: 'http://localhost:3001'

      - name: Run E2E tests
        run: npm run test:e2e:${{ matrix.browser }}
        env:
          CI: true
          # Use the fixture-backed mock server on :3001 instead of
          # localDevServerS3 (which needs AWS creds on the runner).
          E2E_MOCK_BACKEND: 'true'
          VITE_E2E_BYPASS_AUTH: 'true'
          VITE_API_URL: 'http://localhost:3001'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

      - name: Upload trace files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  test-coverage:
    name: Unit Test Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  test-all:
    name: All Tests (Unit + E2E)
    runs-on: ubuntu-latest
    needs: [test-e2e, test-coverage]

    steps:
      - name: Success
        run: echo "All tests passed!"
